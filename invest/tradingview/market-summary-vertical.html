<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: transparent; }
        .tradingview-widget-container { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-summary.js" async>
        {
            "theme": "light",
            "width": "100%",
            "height": "100%",
            "symbolsGroups": [
                {
                    "name": "Indices",
                    "symbols": [
                        { "proName": "FOREXCOM:SPX500", "title": "S&P 500" },
                        { "proName": "FOREXCOM:DJI", "title": "Dow Jones" },
                        { "proName": "NASDAQ:IXIC", "title": "Nasdaq" }
                    ]
                },
                {
                    "name": "Crypto",
                    "symbols": [
                        { "proName": "BITSTAMP:BTCUSD", "title": "Bitcoin" },
                        { "proName": "BITSTAMP:ETHUSD", "title": "Ethereum" }
                    ]
                }
            ],
            "locale": "en"
        }
        </script>
    </div>
</body>
</html>
