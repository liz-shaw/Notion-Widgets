<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Heatmap Widget</title>
    <style>
        /* 关键：让网页全身和容器占满屏幕，并确保有具体高度 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
        }
        .tradingview-widget-container {
            width: 100%;
            height: 100vh; /* 使用 vh 确保容器拥有视口高度 */
        }
    </style>
</head>
<body>

<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <div class="tradingview-widget-copyright">
    <a href="https://www.tradingview.com/heatmap/stock/" rel="noopener nofollow" target="_blank">
      <span class="blue-text">Stock Heatmap</span>
    </a> by TradingView
  </div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
  {
  "dataSource": "SPX500",
  "blockSize": "market_cap_basic",
  "blockColor": "change",
  "grouping": "sector",
  "locale": "en",
  "symbolUrl": "",
  "colorTheme": "light",
  "exchanges": [],
  "hasTopBar": true,
  "isDataSetEnabled": true,
  "isZoomEnabled": true,
  "hasSymbolTooltip": true,
  "isMonoSize": false,
  "width": "100%",
  "height": "100%"
}
  </script>
</div>
</body>
</html>
